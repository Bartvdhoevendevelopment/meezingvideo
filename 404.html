<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pagina niet gevonden — Meezingvideo</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<style>
:root {
  --bg-deep: #0e0e14;
  --surface: #16161f;
  --border: #2a2a38;
  --text: #f5f5f0;
  --text-dim: #aaa;
  --accent: #d97757;
  --accent-glow: rgba(217, 119, 87, 0.45);
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background:
    radial-gradient(1100px 600px at 20% -10%, rgba(217, 119, 87, 0.10), transparent 60%),
    radial-gradient(900px 500px at 110% 10%, rgba(183, 142, 224, 0.08), transparent 60%),
    var(--bg-deep);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  line-height: 1.5;
}
.card {
  width: 100%;
  max-width: 480px;
  text-align: center;
}
.brand-mark {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--accent), #c4634a 70%);
  box-shadow: 0 10px 32px var(--accent-glow);
  color: #fff;
  margin-bottom: 24px;
}
.brand-mark svg { width: 32px; height: 32px; }
.code {
  font-size: 72px;
  font-weight: 800;
  letter-spacing: -0.04em;
  background: linear-gradient(180deg, #ffffff 0%, #c2c2d6 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin: 0 0 8px;
  line-height: 1;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  margin: 0 0 12px;
}
p {
  color: var(--text-dim);
  font-size: 15px;
  margin: 0 0 28px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 22px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 0 6px 20px var(--accent-glow);
}
.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 28px var(--accent-glow);
}
.btn svg { width: 16px; height: 16px; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13" />
        <circle cx="6" cy="18" r="3" />
        <circle cx="18" cy="16" r="3" />
      </svg>
    </div>
    <div class="code">404</div>
    <h1>Deze pagina bestaat niet</h1>
    <p>De link klopt niet of het lied is verplaatst. Geen zorgen — terug naar de startpagina en kies opnieuw.</p>
    <a class="btn" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/>
      </svg>
      Naar de startpagina
    </a>
  </div>
</body>
</html>
