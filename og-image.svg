<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="20%" cy="-10%" r="60%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0e0e14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="110%" cy="110%" r="55%">
      <stop offset="0%" stop-color="#b78ee0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0e0e14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#c4634a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c2c2d6"/>
    </linearGradient>
  </defs>

  <!-- Achtergrond -->
  <rect width="1200" height="630" fill="#0e0e14"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Logo-mark -->
  <g transform="translate(540, 130)">
    <rect width="120" height="120" rx="28" fill="url(#markBg)" />
    <g transform="translate(34, 34)" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 36V4l24-4v28"/>
      <circle cx="6" cy="36" r="6" fill="#fff" stroke="none"/>
      <circle cx="36" cy="32" r="6" fill="#fff" stroke="none"/>
    </g>
  </g>

  <!-- Titel "Meezingvideo" -->
  <text x="600" y="335" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="86" font-weight="700" letter-spacing="-2"
        fill="url(#titleGrad)">Meezingvideo</text>

  <!-- Tagline -->
  <text x="600" y="405" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="30" font-weight="500" fill="#aaa">
    Meezingen met aanbiddingsliederen
  </text>

  <!-- Sub-tagline -->
  <text x="600" y="455" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="400" fill="#888">
    Met meelopende tekst — ook voor slechthorenden en doven
  </text>

  <!-- Decoratieve onderste lijn -->
  <line x1="450" y1="540" x2="750" y2="540"
        stroke="#d97757" stroke-width="2" opacity="0.6"/>
  <circle cx="600" cy="540" r="5" fill="#d97757"/>
</svg>
